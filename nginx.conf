# nginx Configuration
# Nginx configuration for AfroFlicks deployment

server {
    listen 80;
    listen [::]:80;
    server_name afroflicks.com www.afroflicks.com;
    root /var/www/afroflicks;
    index index.html;

    # Enable Gzip
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://www.youtube.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.themoviedb.org;" always;

    # Caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /manifest.json {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Routing
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 404 Error
    error_page 404 /404.html;

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ^/(config\.example|README|\.env|\.git) {
        deny all;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name afroflicks.com www.afroflicks.com;
    return 301 https://$server_name$request_uri;
}
